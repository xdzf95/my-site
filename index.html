<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }
    body {
      color: #fff;
    }
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      padding: 12px 0;
      z-index: 999;
    }
    .nav-inner {
      max-width: 980px;
      margin: auto;
      display: flex;
      justify-content: center;
      gap: 35px;
    }
    .nav a {
      color: #333;
      text-decoration: none;
      font-size: 12px;
    }
    .hero {
      height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }
    .hero h1 {
      font-size: 56px;
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .search-box input {
      width: 500px;
      padding: 16px 20px 16px 44px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.9);
      outline: none;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="nav">
  <div class="nav-inner">
    <a href="index.html">首页</a>
    <a href="#">关于我</a>
    <a href="#">作品</a>
  </div>
</div>

<div class="hero">
  <h1>我的个人网站</h1>
  <div class="search-box">
    <input type="text" placeholder="搜索...">
  </div>
</div>

<div class="footer">© 2026 My Website</div>

</body>
</html>
